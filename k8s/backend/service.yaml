apiVersion: v1
kind: Service
metadata:
  name: bridge-watch-backend
  namespace: bridge-watch
  labels:
    app.kubernetes.io/name: bridge-watch
    app.kubernetes.io/component: backend
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/path: "/metrics"
    prometheus.io/port: "3001"
spec:
  selector:
    app: bridge-watch-backend
  ports:
    - name: http
      port: 3001
      targetPort: 3001
      protocol: TCP
  type: ClusterIP
