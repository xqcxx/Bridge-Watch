apiVersion: apps/v1
kind: Deployment
metadata:
  name: bridge-watch-frontend
  namespace: bridge-watch
  labels:
    app.kubernetes.io/name: bridge-watch
    app.kubernetes.io/component: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: bridge-watch-frontend
  template:
    metadata:
      labels:
        app: bridge-watch-frontend
        app.kubernetes.io/component: frontend
    spec:
      serviceAccountName: bridge-watch
      containers:
        - name: frontend
          image: ghcr.io/stellabridge/bridge-watch-frontend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
              name: http
          env:
            - name: VITE_API_BASE_URL
              value: "https://bridge-watch.example.com/api/v1"
            - name: VITE_WS_URL
              value: "wss://bridge-watch.example.com/api/v1/ws"
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "250m"
