apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: bridge-watch-backend-policy
  namespace: bridge-watch
spec:
  podSelector:
    matchLabels:
      app: bridge-watch-backend
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              name: ingress-nginx
        - podSelector:
            matchLabels:
              app: bridge-watch-frontend
      ports:
        - protocol: TCP
          port: 3001
    - from:
        - namespaceSelector:
            matchLabels:
              name: monitoring
      ports:
        - protocol: TCP
          port: 3001
  egress:
    - to:
        - podSelector:
            matchLabels:
              app: postgres
      ports:
        - protocol: TCP
          port: 5432
    - to:
        - podSelector:
            matchLabels:
              app: redis
      ports:
        - protocol: TCP
          port: 6379
    # External APIs (Stellar, Ethereum, Circle, Coinbase)
    - to: []
      ports:
        - protocol: TCP
          port: 443
        - protocol: TCP
          port: 80

---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: bridge-watch-frontend-policy
  namespace: bridge-watch
spec:
  podSelector:
    matchLabels:
      app: bridge-watch-frontend
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              name: ingress-nginx
      ports:
        - protocol: TCP
          port: 3000
  egress:
    - to:
        - podSelector:
            matchLabels:
              app: bridge-watch-backend
      ports:
        - protocol: TCP
          port: 3001
