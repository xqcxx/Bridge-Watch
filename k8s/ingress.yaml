apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: bridge-watch-ingress
  namespace: bridge-watch
  labels:
    app.kubernetes.io/name: bridge-watch
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "60"
    nginx.ingress.kubernetes.io/use-regex: "true"
    # TLS/SSL redirect
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    # WebSocket support
    nginx.ingress.kubernetes.io/proxy-http-version: "1.1"
    nginx.ingress.kubernetes.io/configuration-snippet: |
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - bridge-watch.example.com
      secretName: bridge-watch-tls
  rules:
    - host: bridge-watch.example.com
      http:
        paths:
          # Backend API and WebSocket
          - path: /api(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: bridge-watch-backend
                port:
                  number: 3001
          - path: /metrics
            pathType: Prefix
            backend:
              service:
                name: bridge-watch-backend
                port:
                  number: 3001
          - path: /health
            pathType: Prefix
            backend:
              service:
                name: bridge-watch-backend
                port:
                  number: 3001
          # Frontend (catch-all)
          - path: /
            pathType: Prefix
            backend:
              service:
                name: bridge-watch-frontend
                port:
                  number: 3000
