name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  backend:
    name: Backend Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: timescale/timescaledb:latest-pg15
        env:
          POSTGRES_DB: bridge_watch_test
          POSTGRES_USER: bridge_watch
          POSTGRES_PASSWORD: test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        working-directory: backend
        run: npm ci

      - name: Lint backend
        working-directory: backend
        run: npm run lint

      - name: Build backend
        working-directory: backend
        run: npm run build

      - name: Validate migration files
        working-directory: backend
        run: npm run migrate:validate
        env:
          NODE_ENV: test
          POSTGRES_HOST: localhost
          POSTGRES_PORT: 5432
          POSTGRES_DB: bridge_watch_test
          POSTGRES_USER: bridge_watch
          POSTGRES_PASSWORD: test_password
          REDIS_HOST: localhost
          REDIS_PORT: 6379

      - name: Run pending migrations
        working-directory: backend
        run: npm run migrate
        env:
          NODE_ENV: test
          POSTGRES_HOST: localhost
          POSTGRES_PORT: 5432
          POSTGRES_DB: bridge_watch_test
          POSTGRES_USER: bridge_watch
          POSTGRES_PASSWORD: test_password
          REDIS_HOST: localhost
          REDIS_PORT: 6379

      - name: Verify migration status
        working-directory: backend
        run: npm run migrate:status
        env:
          NODE_ENV: test
          POSTGRES_HOST: localhost
          POSTGRES_PORT: 5432
          POSTGRES_DB: bridge_watch_test
          POSTGRES_USER: bridge_watch
          POSTGRES_PASSWORD: test_password
          REDIS_HOST: localhost
          REDIS_PORT: 6379

      - name: Run backend tests
        working-directory: backend
        run: npm run test -- --coverage
        env:
          NODE_ENV: test
          POSTGRES_HOST: localhost
          POSTGRES_PORT: 5432
          POSTGRES_DB: bridge_watch_test
          POSTGRES_USER: bridge_watch
          POSTGRES_PASSWORD: test_password
          REDIS_HOST: localhost
          REDIS_PORT: 6379

      - name: Upload coverage reports
        uses: codecov/codecov-action@v4
        with:
          files: ./backend/coverage/coverage-final.json
          flags: backend
          token: ${{ secrets.CODECOV_TOKEN }}
        continue-on-error: true

  frontend:
    name: Frontend Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Lint frontend
        working-directory: frontend
        run: npm run lint

      - name: Type check
        working-directory: frontend
        run: npm run type-check
        continue-on-error: true

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Run frontend tests
        working-directory: frontend
        run: npm run test -- --coverage
        continue-on-error: true

      - name: Upload coverage reports
        uses: codecov/codecov-action@v4
        with:
          files: ./frontend/coverage/coverage-final.json
          flags: frontend
          token: ${{ secrets.CODECOV_TOKEN }}
        continue-on-error: true

  contracts:
    name: Soroban Contracts
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
          components: rustfmt, clippy

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo index
        uses: actions/cache@v4
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-index-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo build
        uses: actions/cache@v4
        with:
          path: contracts/target
          key: ${{ runner.os }}-cargo-build-target-${{ hashFiles('**/Cargo.lock') }}

      - name: Check formatting
        working-directory: contracts
        run: cargo fmt --all -- --check

      - name: Run clippy
        working-directory: contracts
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Build contracts
        working-directory: contracts
        run: cargo build --workspace --target wasm32-unknown-unknown --release

      - name: Run contract tests
        working-directory: contracts
        run: cargo test --workspace

      - name: Run relay integration test suite
        working-directory: contracts
        run: cargo test -p bridge-watch-contracts --test relay_contract.integration

      - name: Generate contract coverage (best effort)
        working-directory: contracts
        run: |
          cargo install cargo-llvm-cov --locked
          cargo llvm-cov -p bridge-watch-contracts --lcov --output-path lcov-contracts.info --tests
        continue-on-error: true

      - name: Upload contract coverage report
        uses: codecov/codecov-action@v4
        with:
          files: ./contracts/lcov-contracts.info
          flags: contracts
          token: ${{ secrets.CODECOV_TOKEN }}
        continue-on-error: true

      - name: Upload contract artifacts
        uses: actions/upload-artifact@v4
        with:
          name: soroban-contracts
          path: contracts/target/wasm32-unknown-unknown/release/*.wasm
          retention-days: 7

  docker-build:
    name: Docker Build Verification
    runs-on: ubuntu-latest
    needs: [backend, frontend, contracts]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: false
          tags: stellar-bridge-watch/backend:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

  status-check:
    name: CI Status Check
    runs-on: ubuntu-latest
    needs: [backend, frontend, contracts, docker-build]
    if: always()

    steps:
      - name: Check all jobs status
        run: |
          if [[ "${{ needs.backend.result }}" != "success" ]] || \
             [[ "${{ needs.frontend.result }}" != "success" ]] || \
             [[ "${{ needs.contracts.result }}" != "success" ]] || \
             [[ "${{ needs.docker-build.result }}" != "success" ]]; then
            echo "One or more CI jobs failed"
            exit 1
          fi
          echo "All CI jobs passed successfully"
