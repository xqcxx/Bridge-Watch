name: Feature Request
description: Propose a new feature or improvement
title: "feat: "
labels: ["enhancement", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to propose a feature! Well-described feature requests are much easier to discuss and prioritise.

        **Before submitting:** please search [existing issues](https://github.com/StellaBridge/Bridge-Watch/issues) and [discussions](https://github.com/StellaBridge/Bridge-Watch/discussions) to see if this has already been raised.

  - type: checkboxes
    id: prerequisites
    attributes:
      label: Prerequisites
      options:
        - label: I searched existing issues and discussions — this is not a duplicate
          required: true
        - label: I have read the project roadmap in README.md
          required: true

  - type: dropdown
    id: area
    attributes:
      label: Area
      description: Which part of the project would this affect?
      options:
        - Backend API
        - Frontend dashboard
        - Soroban contracts
        - Database / migrations
        - CI/CD pipeline
        - Documentation
        - Developer experience
        - Other
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: |
        Describe the problem or gap you're experiencing. Feature requests with a clear "why" are much more likely to be prioritised.
        A good format: "As a [type of user], I need [capability] so that [outcome]."
      placeholder: "As a bridge operator, I need to see a 7-day rolling average of reserve coverage so that I can identify slow drift before it becomes a critical mismatch."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: Describe what you'd like to see built. Be as specific as you can — mock-ups, API shapes, and pseudocode are all welcome.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: What other approaches did you consider? Why is your proposed solution better?

  - type: dropdown
    id: complexity
    attributes:
      label: Estimated complexity
      options:
        - Small (< 1 day — single file change, no new dependencies)
        - Medium (1–3 days — touches multiple files, possible new dependency)
        - Large (> 3 days — new subsystem, breaking change, or significant design work)
        - Unknown
    validations:
      required: true

  - type: checkboxes
    id: contribution
    attributes:
      label: Contribution
      options:
        - label: I am willing to implement this feature myself
        - label: I can help with design or specifications but not implementation
        - label: I am reporting this for someone else to implement

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Links to related issues, external references, prior art in other projects, etc.
