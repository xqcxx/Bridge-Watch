global:
  resolve_timeout: 5m

route:
  receiver: default-slack
  group_by: ["alertname", "service", "team"]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 3h
  routes:
    - matchers:
        - severity="critical"
      receiver: pagerduty
      continue: true
    - matchers:
        - team="bridge"
      receiver: bridge-team
    - matchers:
        - team="api"
      receiver: api-team

receivers:
  - name: default-slack
    slack_configs:
      - api_url: "https://hooks.slack.com/services/REPLACE/ME"
        channel: "#ops-alerts"
        send_resolved: true
        title: "[{{ .Status | toUpper }}] {{ .CommonLabels.alertname }}"
        text: "{{ range .Alerts }}{{ .Annotations.description }}\nRunbook: {{ .Annotations.runbook_url }}\n{{ end }}"

  - name: pagerduty
    pagerduty_configs:
      - routing_key: "REPLACE_WITH_PAGERDUTY_INTEGRATION_KEY"
        severity: "{{ .CommonLabels.severity }}"
        description: "{{ .CommonLabels.alertname }} - {{ .CommonAnnotations.summary }}"

  - name: bridge-team
    slack_configs:
      - api_url: "https://hooks.slack.com/services/REPLACE/ME"
        channel: "#bridge-alerts"
        send_resolved: true

  - name: api-team
    slack_configs:
      - api_url: "https://hooks.slack.com/services/REPLACE/ME"
        channel: "#api-alerts"
        send_resolved: true
